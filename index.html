<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Antigravity Solitaire 2D</title>

  <!-- Estilos -->
  <link rel="stylesheet" href="style.css" />

  <!-- Dica: você pode personalizar o favicon adicionando /favicon.ico -->
</head>
<body>
  <header>
    <h1>Antigravity Solitaire 2D</h1>
    <div class="stats">
      <span>Score: <span id="score" class="stat-value">0</span></span>
      <span>Movimentos: <span id="moves" class="stat-value">0</span></span>
      <span>Tempo: <span id="timer" class="stat-value">00:00</span></span>
    </div>
    <nav>
      <button id="new-game-btn" class="btn">Novo Jogo</button>
      <button id="hint-btn" class="btn">Dica</button>
    </nav>
  </header>

  <main class="game-container">
    <!-- O canvas é onde todo o jogo é desenhado -->
    <canvas id="game-canvas"></canvas>
  </main>

  <!-- Pyodide: Python no navegador -->
  <script src="https://cdn.jsdelivr.net/pyodide/v0.24.1/full/pyodide.js"></script>
  <script>
    (async () => {
      // Carrega o runtime do Pyodide
      const pyodide = await loadPyodide({
        indexURL: "https://cdn.jsdelivr.net/pyodide/v0.24.1/full/"
      });

      // Escreve os arquivos Python no FS virtual do Pyodide
      const files = ["card_logic.py", "main.py"];
      for (const path of files) {
        const resp = await fetch(path);
        const code = await resp.text();
        pyodide.FS.writeFile(path, code);
      }

      // Importa e inicia o jogo (main.py)
      await pyodide.runPythonAsync("import main");
    })();
  </script>
</body>
</html>
